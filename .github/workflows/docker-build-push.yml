name: Docker Build and Push to ACR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version to build (optional, defaults to current ref)'
        required: false
        type: string

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  NAMESPACE: linran-pub
  IMAGE_NAME: sing-box

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set ref
        id: ref
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            ref="${{ github.event.inputs.tag }}"
          else
            ref="${{ github.ref_name }}"
          fi

          if [[ "$ref" == *"-"* ]]; then
            latest="latest-beta"
          else
            latest="latest"
          fi

          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.ref }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.ref.outputs.latest }}
